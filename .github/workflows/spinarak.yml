name: Spinarak bot

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [ 'main' ] 
  workflow_dispatch:

concurrency:
  group: spinarak-bot
  cancel-in-progress: true

jobs:
  run-spinarak:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v1
      
    - name: Install dependencies
      run: |
        # font package needed for Japanese to render in captured screenshots
        sudo apt-get update
        sudo apt-get install fonts-noto-cjk
        python -m pip install --upgrade pip
        pip install selenium beautifulsoup4
        
    - name: Run Python Selenium script
      env:
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
        GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
        GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        GMAIL_RECIPIENT_2: ${{ secrets.GMAIL_RECIPIENT_2 }}
      run: |
          echo -e "current NAT'd source IP address: `curl -s api.ipify.org`\n\n"
          python spinarak.py
          ls -al
          
    - name: Check if there are any changes
      id: verify_diff
      run: |
          git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT
          
    - name: Commit & push screenshot to repo
      if: steps.verify_diff.outputs.changed == 'true'
      run: |
          git config --global user.name '${{github.actor}}'
          git config --global user.email '${{github.actor}}@users.noreply.github.com'
          git add --all
          git commit -m "Screenshot(s)"
          git pull --rebase
          git push
